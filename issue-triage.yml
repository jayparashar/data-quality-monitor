name: Issue Triage

description: >
  When a new issue is opened, read the content and apply the most appropriate
  label based on what the issue is describing. Leave a short comment explaining
  the label choice so the author knows their issue has been reviewed.

triggers:
  - type: issue_created

tools:
  - update_issue_labels
  - create_issue_comment

prompt: >
  A new issue has been opened in this repository. Read the issue title and body
  carefully and apply exactly one of the following labels:

  - bug: the issue describes something that is broken or producing incorrect results
  - enhancement: the issue requests a new feature or improvement to existing behavior
  - data-schema: the issue is specifically about column definitions, expected types, schema drift, or validation rules
  - needs-clarification: the issue is too vague to categorize confidently, or is missing key details

  After applying the label, post a brief comment (2-3 sentences max) explaining
  which label you chose and why. Be direct and friendly. Do not ask follow-up
  questions unless the label you chose is needs-clarification, in which case
  briefly describe what additional information would help.

  Do not change any code. Do not open a pull request. Label and comment only.
